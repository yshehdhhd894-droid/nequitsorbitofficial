<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Nequi Tsorbit">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="85%">
      <stop offset="0%" stop-color="#141c2e"/>
      <stop offset="46%" stop-color="#0d1018"/>
      <stop offset="100%" stop-color="#05070c"/>
    </radialGradient>

    <!-- Núcleo fusionado: fuego arriba-izquierda, agua abajo-derecha -->
    <linearGradient id="core" x1="18%" y1="12%" x2="86%" y2="92%">
      <stop offset="0%" stop-color="#ffd9a8"/>
      <stop offset="26%" stop-color="#ff8a3d"/>
      <stop offset="50%" stop-color="#a25cf0"/>
      <stop offset="74%" stop-color="#2bb8e6"/>
      <stop offset="100%" stop-color="#1f7fd6"/>
    </linearGradient>

    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9e5c" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#a25cf0" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#2bb8e6" stop-opacity="0"/>
    </radialGradient>

    <!-- Anillos: uno fuego->agua, otro agua->fuego -->
    <linearGradient id="ringFW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffc48c"/>
      <stop offset="34%" stop-color="#ff6b3d"/>
      <stop offset="66%" stop-color="#a25cf0"/>
      <stop offset="100%" stop-color="#2bb8e6"/>
    </linearGradient>
    <linearGradient id="ringWF" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f7fd6"/>
      <stop offset="40%" stop-color="#2bb8e6"/>
      <stop offset="72%" stop-color="#a25cf0"/>
      <stop offset="100%" stop-color="#ff8a3d"/>
    </linearGradient>

    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffc48c"/>
      <stop offset="42%" stop-color="#ff6b3d"/>
      <stop offset="60%" stop-color="#a25cf0"/>
      <stop offset="100%" stop-color="#2bb8e6"/>
    </linearGradient>

    <linearGradient id="mono" x1="15%" y1="10%" x2="90%" y2="95%">
      <stop offset="0%" stop-color="#fff3e8"/>
      <stop offset="45%" stop-color="#ffd9c0"/>
      <stop offset="100%" stop-color="#cfeeff"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="26" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Partículas: chispas (fuego) y gotas (agua) -->
  <g>
    <circle cx="185" cy="215" r="3.2" fill="#ff8a3d" opacity="0.85"/>
    <circle cx="864" cy="250" r="2.6" fill="#2bb8e6" opacity="0.85"/>
    <circle cx="828" cy="792" r="3" fill="#1f7fd6" opacity="0.8"/>
    <circle cx="205" cy="812" r="2.4" fill="#ff6b3d" opacity="0.8"/>
    <circle cx="128" cy="520" r="2.2" fill="#ffc48c" opacity="0.7"/>
    <circle cx="922" cy="560" r="2.6" fill="#6ee7ff" opacity="0.7"/>
  </g>

  <g transform="translate(512 448)">
    <circle cx="0" cy="0" r="320" fill="url(#coreGlow)"/>

    <!-- Sistema orbital -->
    <ellipse cx="0" cy="0" rx="308" ry="120" fill="none" stroke="url(#ringFW)" stroke-width="12"
             transform="rotate(-26)" filter="url(#glow)" stroke-linecap="round"/>
    <ellipse cx="0" cy="0" rx="308" ry="120" fill="none" stroke="url(#ringWF)" stroke-width="8"
             transform="rotate(32)" filter="url(#glow)" opacity="0.92" stroke-linecap="round"/>
    <ellipse cx="0" cy="0" rx="326" ry="94" fill="none" stroke="url(#ringFW)" stroke-width="4"
             transform="rotate(88)" opacity="0.5"/>

    <!-- Orbes: chispa fuego + gota agua -->
    <g filter="url(#glow)">
      <circle cx="272" cy="-140" r="18" fill="#ff8a3d"/>
      <circle cx="-292" cy="98" r="15" fill="#2bb8e6"/>
      <circle cx="150" cy="212" r="11" fill="#a25cf0"/>
    </g>

    <!-- Núcleo fusionado -->
    <circle cx="0" cy="0" r="178" fill="url(#core)" filter="url(#softGlow)"/>
    <ellipse cx="-58" cy="-70" rx="76" ry="46" fill="#ffffff" opacity="0.28"/>

    <!-- Monograma NT -->
    <text x="0" y="54" text-anchor="middle"
          font-family="'Rajdhani','Segoe UI',sans-serif" font-weight="700"
          font-size="188" fill="#0a1220" opacity="0.35">NT</text>
    <text x="-4" y="48" text-anchor="middle"
          font-family="'Rajdhani','Segoe UI',sans-serif" font-weight="700"
          font-size="188" fill="url(#mono)" filter="url(#glow)">NT</text>
  </g>

  <g text-anchor="middle" font-family="'Cinzel','Georgia',serif">
    <text x="512" y="842" font-size="122" font-weight="900" letter-spacing="3"
          fill="url(#wordmark)" filter="url(#glow)">NEQUI</text>
    <text x="512" y="924" font-size="58" font-weight="700" letter-spacing="18"
          fill="#9fb2c9">TSORBIT</text>
  </g>
</svg>
