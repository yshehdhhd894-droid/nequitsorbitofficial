<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Nequi Tsorbit">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#2a2008"/>
      <stop offset="45%" stop-color="#14100a"/>
      <stop offset="100%" stop-color="#070502"/>
    </radialGradient>

    <radialGradient id="core" cx="40%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#fff8e0"/>
      <stop offset="24%" stop-color="#ffe9a8"/>
      <stop offset="52%" stop-color="#f5c451"/>
      <stop offset="80%" stop-color="#c9971f"/>
      <stop offset="100%" stop-color="#6b4d08"/>
    </radialGradient>

    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9a8" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#e8b23a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e8b23a" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ringA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="50%" stop-color="#f5c451"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="ringB" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffcf6b"/>
      <stop offset="100%" stop-color="#fff3c4"/>
    </linearGradient>

    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff8e0"/>
      <stop offset="45%" stop-color="#f5c451"/>
      <stop offset="100%" stop-color="#a9780c"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="30" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="210" fill="url(#bg)"/>

  <g fill="#ffe9a8">
    <circle cx="170" cy="200" r="3" opacity="0.9"/>
    <circle cx="870" cy="240" r="2.5" opacity="0.8"/>
    <circle cx="820" cy="800" r="3" opacity="0.7"/>
    <circle cx="200" cy="820" r="2.2" opacity="0.7"/>
    <circle cx="120" cy="520" r="2" opacity="0.6"/>
    <circle cx="930" cy="560" r="2.4" opacity="0.6"/>
  </g>

  <g transform="translate(512 452)">
    <circle cx="0" cy="0" r="300" fill="url(#coreGlow)"/>

    <ellipse cx="0" cy="0" rx="300" ry="118" fill="none" stroke="url(#ringA)" stroke-width="11"
             transform="rotate(-26)" filter="url(#glow)"/>
    <ellipse cx="0" cy="0" rx="300" ry="118" fill="none" stroke="url(#ringB)" stroke-width="8"
             transform="rotate(30)" filter="url(#glow)" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="318" ry="92" fill="none" stroke="url(#ringA)" stroke-width="4"
             transform="rotate(86)" opacity="0.55"/>

    <g filter="url(#glow)">
      <circle cx="266" cy="-138" r="19" fill="#fff3c4"/>
      <circle cx="-288" cy="94" r="15" fill="#c9971f"/>
      <circle cx="150" cy="205" r="12" fill="#ffcf6b"/>
    </g>

    <circle cx="0" cy="0" r="172" fill="url(#core)" filter="url(#softGlow)"/>
    <ellipse cx="-54" cy="-64" rx="72" ry="44" fill="#ffffff" opacity="0.4"/>

    <text x="0" y="52" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif" font-weight="700"
          font-size="185" fill="#4a3405" opacity="0.4">NT</text>
    <text x="-3" y="46" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif" font-weight="700"
          font-size="185" fill="#fff8e6" filter="url(#glow)">NT</text>
  </g>

  <g text-anchor="middle" font-family="Georgia, 'Times New Roman', serif">
    <text x="512" y="838" font-size="120" font-weight="700" letter-spacing="2"
          fill="url(#metal)" filter="url(#glow)">NEQUI</text>
    <text x="512" y="922" font-size="60" font-weight="700" letter-spacing="18"
          fill="#f5c451">TSORBIT</text>
  </g>
</svg>
